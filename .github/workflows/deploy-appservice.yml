name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --select=E,W,F --ignore=E501

      - name: Syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile config/settings.py
          python -m py_compile agent/research_agent.py
          python -m py_compile utils/scraper.py
          python -m py_compile utils/search.py
          echo "All files OK"
