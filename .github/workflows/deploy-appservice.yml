name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME:       ${{ vars.ACR_NAME       || 'airesearchregistry' }}
  APP_NAME:       ${{ vars.APP_NAME       || 'ai-research-agent' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-research-agent' }}
  LOCATION:       ${{ vars.LOCATION       || 'eastus' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --select=E,W,F --ignore=E501

      - name: Python syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile config/settings.py
          python -m py_compile agent/research_agent.py
          python -m py_compile utils/scraper.py
          python -m py_compile utils/search.py
          echo "All files pass syntax check ✔"

  build:
    name: Build & Push
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Compute image tag
        id: image
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-8)
          URI="${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${SHORT_SHA}"
          echo "uri=${URI}" >> $GITHUB_OUTPUT
          echo "Image URI: ${URI}"
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update App Service image
        run: |
          IMAGE="${{ needs.build.outputs.image_uri }}"
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --docker-custom-image-name "$IMAGE" \
            --output none

          az webapp restart \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --output none

      - name: Sync secrets
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --settings GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --output none

      - name: Verify app is responding
        run: |
          APP_URL=$(az webapp show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --query defaultHostName -o tsv)

          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_URL}/_stcore/health" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✔ App is healthy"
              echo "🚀 Live at: https://${APP_URL}"
              exit 0
            fi
            echo "Attempt $i/12 — status $STATUS, retrying in 15s..."
            sleep 15
          done
          exit 1